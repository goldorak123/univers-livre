<!DOCTYPE html>
<html lang="fr" class="notranslate" translate="no">

<head>
    <meta charset="UTF-8">

    <title>404 - Perdu dans l'espace ?</title>
    <style>
        :root {
            --bg: #050505;
            --gold: #d8b25a;
            --text: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background:
                radial-gradient(1200px 600px at 50% 18%, rgba(255, 255, 255, 0.06), transparent 60%),
                radial-gradient(900px 500px at 50% 85%, rgba(255, 255, 255, 0.04), transparent 65%),
                linear-gradient(#060606, #040404);
            color: var(--text);
            font-family: 'Montserrat', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Focus Reset */
        a:focus,
        button:focus {
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        /* STARS EFFECT */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 4px 4px;
            opacity: 0.3;
            pointer-events: none;
            animation: twinkle 5s infinite ease-in-out;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.5;
            }
        }

        h1 {
            font-size: clamp(60px, 15vw, 150px);
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 20px;
            line-height: 1;
            text-shadow: 0 0 20px rgba(216, 178, 90, 0.4);
        }

        p {
            font-size: clamp(18px, 4vw, 24px);
            max-width: 600px;
            margin: 0 auto 40px;
            line-height: 1.5;
            opacity: 0.9;
            padding: 0 20px;
        }

        .btn-return {
            display: inline-block;
            padding: 15px 30px;
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (hover: hover) {
            .btn-return:hover {
                background: var(--gold);
                color: #000;
                box-shadow: 0 0 20px rgba(216, 178, 90, 0.6);
                transform: scale(1.05);
            }
        }

        /* Mobile: Remove decorative underlines/bars on buttons and links */
        @media (max-width: 768px) {

            a::after,
            button::after,
            [class*="btn"]::after,
            [class*="link"]::after,
            .print-btn span::after {
                display: none !important;
            }
        }

        /* --- LUXURY UNDERLINE SYSTEM --- */
        .footer-nav a::after,
        .footer-nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--gold);
            transition: all 0.4s ease;
            transform: translateX(-50%);
        }

        .footer-nav a:hover::after,
        .footer-nav-links a:hover::after {
            width: 60%;
        }
    
        .pwa-text-banner {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pwa-text-banner:hover {
            filter: drop-shadow(0 0 25px rgba(216, 178, 90, 1)) !important;
            transform: scale(1.02);
        }
        .pwa-install-hint {
            font-family: 'Inter', sans-serif;
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: rgba(170, 170, 170, 0.8);
            text-transform: uppercase;
            margin-top: 2px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: color 0.3s ease;
            text-align: center;
        }
        .pwa-install-hint:hover {
            color: var(--gold, #d8b25a);
        }

    
        /* PWA Uniform Sub-Icons */
        .pwa-icon-item {
            cursor: pointer;
        }
        .pwa-icon-item:hover .pwa-icon-small {
            filter: drop-shadow(0 0 15px rgba(216, 178, 90, 0.8)) !important;
            transform: scale(1.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pwa-icon-item:hover .pwa-icon-label {
            color: var(--gold, #d8b25a);
            transition: color 0.3s ease;
        }

    <!-- PWA Installation Logic -->
    <script>
        // SYSTÈME DE GESTION PWA - FORCE UPDATE v42
        (async function() {
            const v = 'v42.pwa_fix';
            if (localStorage.getItem('pwa_v') !== v) {
                if ('serviceWorker' in navigator) {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const r of regs) await r.unregister();
                    } catch(e) {}
                }
                if ('caches' in window) {
                    try {
                        const keys = await caches.keys();
                        for (const k of keys) await caches.delete(k);
                    } catch(e) {}
                }
                localStorage.clear();
                sessionStorage.clear();
                localStorage.setItem('pwa_v', v);
                window.location.reload(true);
            } else {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw-v41.js?v=42_' + Date.now(), {
                        updateViaCache: 'none'
                    }).catch(() => {});
                }
            }
        })();

        // LOGIQUE D'INSTALLATION
        window.installPWA = function() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                console.log("Installation non disponible ou l'application est déjà installée.");
            }
        };
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });

        // BIND BUTTONS AUTOMATICALLY
        document.addEventListener('DOMContentLoaded', () => {
            const btns = document.querySelectorAll('#installAppBtn, #install-btn');
            btns.forEach(btn => {
                btn.style.cursor = 'pointer';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.installPWA();
                });
            });
        });
    </script>

    <!-- PWA Install Logic -->
    <script>
        function installPWA() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                // If deferredPrompt is null, meaning prompt cannot be shown
                // We could dispatch an event or log it.
                console.log("Installation non disponible ou l'application est déjà installée.");
                alert("L'application est déjà installée ou votre navigateur ne la supporte pas en mode PWA. Sur iOS, utilisez 'Partager > Sur l'écran d'accueil'.");
            }
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });
    </script>

    

    <!-- STRICT BACK BUTTON HYGIENE V2 -->
    <style>
        /* ABSOLUTE KILL SWITCH FOR MOBILE: 
           Never show on screens <= 900px, regardless of PWA */
        @media (max-width: 900px) {
            .back-hub-btn, a.back-hub-btn, a[class*="back-hub-btn"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
                z-index: -9999 !important;
            }

        /* ONLY SHOW on DESKTOP (min-width: 901px) AND ONLY IF PWA */
        @media (display-mode: standalone) and (min-width: 901px) {
            .back-hub-btn, a.back-hub-btn, a[class*="back-hub-btn"] {
                display: flex !important;
            }
        }
        
        /* Default hide for non-PWA desktop just in case */
        @media (min-width: 901px) {
            .back-hub-btn:not(:window-inactive) {
                /* We rely on the standalone query above to override this. But default to none. */
                display: none;
            }
        }
    </style>


    <!-- GLOBAL HYPHENATION & TEXT WRAP FIX -->
    <style>
        /* Force hyphenation on ALL paragraphs, subtitles, and text blocks to prevent huge gaps in justified text */
        p, .hero-subtitle, .hero-summary, .hero-summary p, .author-info-large p, .testimonial-text, .text-block, [class*="subtitle"], [class*="text"] {
            -webkit-hyphens: auto !important;
            -moz-hyphens: auto !important;
            -ms-hyphens: auto !important;
            hyphens: auto !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
        }

        /* Specifically for mobile to avoid 2 words per line with giant spaces */
        @media (max-width: 900px) {
            h1, h2, h3, h4, .hero-title, .hero-subtitle {
                word-wrap: break-word !important;
                overflow-wrap: break-word !important;
                -webkit-hyphens: auto !important;
                hyphens: auto !important;
            }

<!DOCTYPE html>
<html lang="fr" class="notranslate" translate="no">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <script>
        // PURGE TOTALE v30
        async function purgeV30() {
            const v = 'v30';
            if (localStorage.getItem('sl_v30') !== v) {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (const r of regs) await r.unregister();
                }
                if ('caches' in window) {
                    const keys = await caches.keys();
                    for (const k of keys) await caches.delete(k);
                }
                localStorage.setItem('sl_v30', v);
                window.location.reload(true);
            }
        }
        purgeV30();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw-v30.js');
            });
        }

        if (window.history.length <= 1) {
            window.history.pushState({ page: 1 }, "", window.location.href);
        }
    </script>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <title>Simon Lero v30 - New Icon</title>
    <script>
        setTimeout(() => { window.location.href = "livre-accueil.html"; }, 150);
    </script>

  <style>
    @media (max-width: 900px) {
      .mobile-nav-bar {
        background-color: #000 !important;
        padding-bottom: 10px;
        padding-top: 10px;
      }
    }
  </style>
    <!-- PWA Installation Logic -->
    <script>
        // SYSTÈME DE GESTION PWA - FORCE UPDATE v42
        (async function() {
            const v = 'v42.pwa_fix';
            if (localStorage.getItem('pwa_v') !== v) {
                if ('serviceWorker' in navigator) {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const r of regs) await r.unregister();
                    } catch(e) {}
                }
                if ('caches' in window) {
                    try {
                        const keys = await caches.keys();
                        for (const k of keys) await caches.delete(k);
                    } catch(e) {}
                }
                localStorage.clear();
                sessionStorage.clear();
                localStorage.setItem('pwa_v', v);
                window.location.reload(true);
            } else {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw-v41.js?v=42_' + Date.now(), {
                        updateViaCache: 'none'
                    }).catch(() => {});
                }
            }
        })();

        // LOGIQUE D'INSTALLATION
        window.installPWA = function() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                console.log("Installation non disponible ou l'application est déjà installée.");
            }
        };
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });

        // BIND BUTTONS AUTOMATICALLY
        document.addEventListener('DOMContentLoaded', () => {
            const btns = document.querySelectorAll('#installAppBtn, #install-btn');
            btns.forEach(btn => {
                btn.style.cursor = 'pointer';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.installPWA();
                });
            });
        });
    </script>
</head>

<body
    style="background:#000; color:#fff; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">
    <h2>APPLICATION DE LA NOUVELLE ICÔNE...</h2>
</body>

</html>

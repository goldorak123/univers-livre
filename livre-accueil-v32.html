<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">

    <script>
        // PURGE TOTALE v32
        async function purgeV32() {
            const v = 'v32';
            if (localStorage.getItem('sl_v32') !== v) {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (const r of regs) await r.unregister();
                }
                if ('caches' in window) {
                    const keys = await caches.keys();
                    for (const k of keys) await caches.delete(k);
                }
                localStorage.setItem('sl_v32', v);
                window.location.reload(true);
            }
        }
        purgeV32();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw-v32.js');
            });
        }
    </script>

    <link rel="manifest" href="manifest-v32.json">
    <link rel="apple-touch-icon" href="pwa-plume-apple.png">

    <script>
        setTimeout(() => { window.location.href = "livre-accueil.html"; }, 200);

    <!-- PWA Installation Logic -->
    <script>
        // SYSTÈME DE GESTION PWA - FORCE UPDATE v42
        (async function() {
            const v = 'v42.pwa_fix';
            if (localStorage.getItem('pwa_v') !== v) {
                if ('serviceWorker' in navigator) {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const r of regs) await r.unregister();
                    } catch(e) {}
                }
                if ('caches' in window) {
                    try {
                        const keys = await caches.keys();
                        for (const k of keys) await caches.delete(k);
                    } catch(e) {}
                }
                localStorage.clear();
                sessionStorage.clear();
                localStorage.setItem('pwa_v', v);
                window.location.reload(true);
            } else {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw-v41.js?v=42_' + Date.now(), {
                        updateViaCache: 'none'
                    }).catch(() => {});
                }
            }
        })();

        // LOGIQUE D'INSTALLATION
        window.installPWA = function() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                console.log("Installation non disponible ou l'application est déjà installée.");
            }
        };
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });

        // BIND BUTTONS AUTOMATICALLY
        document.addEventListener('DOMContentLoaded', () => {
            const btns = document.querySelectorAll('#installAppBtn, #install-btn');
            btns.forEach(btn => {
                btn.style.cursor = 'pointer';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.installPWA();
                });
            });
        });
    </script>

    <!-- PWA Install Logic -->
    <script>
        function installPWA() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                // If deferredPrompt is null, meaning prompt cannot be shown
                // We could dispatch an event or log it.
                console.log("Installation non disponible ou l'application est déjà installée.");
            }
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });
    </script>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RESET PWA v33</title>
    <script>
        async function nuclearReset() {
            // Unregister all SW
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const r of regs) await r.unregister();
            }
            // Clear all Caches
            if ('caches' in window) {
                const keys = await caches.keys();
                for (const k of keys) await caches.delete(k);
            }
            // Clear LocalStorage & Session
            localStorage.clear();
            sessionStorage.clear();

            alert("RESET TERMINÉ.\n\nFermez tous les onglets simonlero.com et l'application avant de réinstaller via la page d'accueil.");
            window.location.href = "livre-accueil.html";
        }
        nuclearReset();
    </script>

  <style>
    @media (max-width: 900px) {
      .mobile-nav-bar {
        background-color: #000 !important;
        padding-bottom: 10px;
        padding-top: 10px;
      }
    }
  </style>
    <!-- PWA Installation Logic -->
    <script>
        // SYSTÈME DE GESTION PWA - FORCE UPDATE v42
        (async function() {
            const v = 'v42.pwa_fix';
            if (localStorage.getItem('pwa_v') !== v) {
                if ('serviceWorker' in navigator) {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const r of regs) await r.unregister();
                    } catch(e) {}
                }
                if ('caches' in window) {
                    try {
                        const keys = await caches.keys();
                        for (const k of keys) await caches.delete(k);
                    } catch(e) {}
                }
                localStorage.clear();
                sessionStorage.clear();
                localStorage.setItem('pwa_v', v);
                window.location.reload(true);
            } else {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw-v41.js?v=42_' + Date.now(), {
                        updateViaCache: 'none'
                    }).catch(() => {});
                }
            }
        })();

        // LOGIQUE D'INSTALLATION
        window.installPWA = function() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                console.log("Installation non disponible ou l'application est déjà installée.");
            }
        };
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });

        // BIND BUTTONS AUTOMATICALLY
        document.addEventListener('DOMContentLoaded', () => {
            const btns = document.querySelectorAll('#installAppBtn, #install-btn');
            btns.forEach(btn => {
                btn.style.cursor = 'pointer';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.installPWA();
                });
            });
        });
    </script>

    <!-- PWA Install Logic -->
    <script>
        function installPWA() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                // If deferredPrompt is null, meaning prompt cannot be shown
                // We could dispatch an event or log it.
                console.log("Installation non disponible ou l'application est déjà installée.");
            }
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });
    </script>
</head>

<body
    style="background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh;">
    <h1>RÉINITIALISATION EN COURS...</h1>
</body>

    <!-- PWA Installation Logic -->
    <script>
        // SYSTÈME DE GESTION PWA - FORCE UPDATE v42
        (async function() {
            const v = 'v42.pwa_fix';
            if (localStorage.getItem('pwa_v') !== v) {
                if ('serviceWorker' in navigator) {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const r of regs) await r.unregister();
                    } catch(e) {}
                }
                if ('caches' in window) {
                    try {
                        const keys = await caches.keys();
                        for (const k of keys) await caches.delete(k);
                    } catch(e) {}
                }
                localStorage.clear();
                sessionStorage.clear();
                localStorage.setItem('pwa_v', v);
                window.location.reload(true);
            } else {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw-v41.js?v=42_' + Date.now(), {
                        updateViaCache: 'none'
                    }).catch(() => {});
                }
            }
        })();

        // LOGIQUE D'INSTALLATION
        window.installPWA = function() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                console.log("Installation non disponible ou l'application est déjà installée.");
            }
        };
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });

        // BIND BUTTONS AUTOMATICALLY
        document.addEventListener('DOMContentLoaded', () => {
            const btns = document.querySelectorAll('#installAppBtn, #install-btn');
            btns.forEach(btn => {
                btn.style.cursor = 'pointer';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.installPWA();
                });
            });
        });
    </script>

    <!-- PWA Install Logic -->
    <script>
        function installPWA() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                // If deferredPrompt is null, meaning prompt cannot be shown
                // We could dispatch an event or log it.
                console.log("Installation non disponible ou l'application est déjà installée.");
                alert("L'application est déjà installée ou votre navigateur ne la supporte pas en mode PWA. Sur iOS, utilisez 'Partager > Sur l'écran d'accueil'.");
            }
        }
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });
    </script>

<body>
    <h1>SIMON LERO v35</h1>
    <p>Pour corriger l'icône, nous devons nettoyer le cache.</p>

    <button id="resetBtn">CLIQUEZ ICI POUR NETTOYER</button>

    <div id="status" class="status">En attente...</div>

    <script>
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            status.innerText = "Nettoyage en cours...";

            try {
                // 1. Unregister SW
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (const r of regs) {
                        await r.unregister();
                        console.log("SW unregistred");
                    }
                }

                // 2. Clear Caches
                if ('caches' in window) {
                    const keys = await caches.keys();
                    for (const k of keys) {
                        await caches.delete(k);
                        console.log("Cache deleted:", k);
                    }
                }

                // 3. Storage
                localStorage.clear();
                sessionStorage.clear();

                status.innerText = "NETTOYAGE TERMINÉ !";
                alert("SYCHRONISATION RÉUSSIE (v35) !\n\nCliquez sur OK pour retourner à l'accueil.");
                window.location.href = "livre-accueil.html?v35=done";
            } catch (err) {
                alert("Erreur: " + err);
            }
        });
    </script>

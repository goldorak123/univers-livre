<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sychro PWA v36</title>
    <style>
        body {
            background: #000;
            color: #d4af37;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .btn {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>

  <style>
    @media (max-width: 900px) {
      .mobile-nav-bar {
        background-color: #000 !important;
        padding-bottom: 10px;
        padding-top: 10px;
      }
    }
  </style>
    <!-- PWA Installation Logic -->
    <script>
        // SYSTÈME DE GESTION PWA - FORCE UPDATE v42
        (async function() {
            const v = 'v42.pwa_fix';
            if (localStorage.getItem('pwa_v') !== v) {
                if ('serviceWorker' in navigator) {
                    try {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        for (const r of regs) await r.unregister();
                    } catch(e) {}
                }
                if ('caches' in window) {
                    try {
                        const keys = await caches.keys();
                        for (const k of keys) await caches.delete(k);
                    } catch(e) {}
                }
                localStorage.clear();
                sessionStorage.clear();
                localStorage.setItem('pwa_v', v);
                window.location.reload(true);
            } else {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw-v41.js?v=42_' + Date.now(), {
                        updateViaCache: 'none'
                    }).catch(() => {});
                }
            }
        })();

        // LOGIQUE D'INSTALLATION
        window.installPWA = function() {
            if (window.deferredPrompt) {
                window.deferredPrompt.prompt();
                window.deferredPrompt.userChoice.then(() => {
                    window.deferredPrompt = null;
                });
            } else {
                console.log("Installation non disponible ou l'application est déjà installée.");
            }
        };
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.deferredPrompt = e;
        });

        // BIND BUTTONS AUTOMATICALLY
        document.addEventListener('DOMContentLoaded', () => {
            const btns = document.querySelectorAll('#installAppBtn, #install-btn');
            btns.forEach(btn => {
                btn.style.cursor = 'pointer';
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.installPWA();
                });
            });
        });
    </script>
</head>

<body>
    <img src="gold-plume-192.png" width="100" height="100" style="border-radius:20px; border: 2px solid #d4af37;">
    <h1>NETTOYAGE v36</h1>
    <p>On force la plume dorée !</p>
    <button class="btn" onclick="goReset()">LANCER LE RESET v36</button>

    <script>
        async function goReset() {
            if ('serviceWorker' in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const r of regs) await r.unregister();
            }
            if ('caches' in window) {
                const keys = await caches.keys();
                for (const k of keys) await caches.delete(k);
            }
            localStorage.clear();
            alert("RESET OK (v36) !\n\nDésinstallez l'ancienne app, fermez Chrome, et réinstallez.");
            window.location.href = "livre-accueil.html?v36=done";
        }
    </script>
</body>

</html>
